<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ Lọc Sản Phẩm</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f6ef;
            padding: 20px;
        }
        .filter-container {
            width: 300px;
            background: white;
            padding: 15px;
            border-radius: 8px;
        }
        .filter-section {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .filter-header {
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .filter-header i {
            transition: transform 0.3s;
        }
        .filter-content {
            display: none;
            padding-top: 10px;
        }
        .filter-content label {
            display: block;
            margin: 5px 0;
        }
        .filter-button {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #555;
            cursor: pointer;
            margin-top: 15px;
            background-color: white;
        }
    </style>
</head>
<body>
    <div class="filter-container">
        <div class="filter-section">
            <div class="filter-header">ÁNH SÁNG TRONG NHÀ <i class="arrow">▼</i></div>
            <div class="filter-content">
                <label><input type="checkbox"> Ánh sáng yếu / Nhân tạo</label>
                <label><input type="checkbox"> Ánh sáng gián tiếp</label>
                <label><input type="checkbox"> Ánh sáng trực tiếp</label>
            </div>
        </div>
        <div class="filter-section">
            <div class="filter-header">KÍCH THƯỚC CÂY <i class="arrow">▼</i></div>
            <div class="filter-content">
                <label><input type="checkbox"> XS (5"-12")</label>
                <label><input type="checkbox"> SM (7"-18")</label>
                <label><input type="checkbox"> MD (1-2 FT)</label>
                <label><input type="checkbox"> LG (1.5-2.5 FT)</label>
                <label><input type="checkbox"> XL (2-3 FT)</label>
                <label><input type="checkbox"> XXL (3-5 FT)</label>
            </div>
        </div>
        <div class="filter-section">
            <div class="filter-header">ĐỘ KHÓ <i class="arrow">▼</i></div>
            <div class="filter-content">
                <label><input type="checkbox"> Dễ</label>
                <label><input type="checkbox"> Trung bình</label>
                <label><input type="checkbox"> Khó</label>
            </div>
        </div>
        <div class="filter-button">XÓA BỘ LỌC</div>
    </div>
    <script>
        $(document).ready(function () {
            $(".filter-header").click(function () {
                $(this).next(".filter-content").slideToggle();
                $(this).find(".arrow").toggleClass("open");
            });
            
            $(".filter-button").click(function () {
                $("input[type=checkbox]").prop("checked", false);
            });
        });
    </script>
</body>
</html>
